{% extends "base.html" %}
{% block title %}Sign Up - BookVerse AI{% endblock %}
{% block content %}
<div class="auth-container fade-in">
    <div class="auth-card signup-card">
        <h2>Join BookVerse <span class="accent">AI</span></h2>
        <p class="auth-subtitle">Create an account to start your journey</p>
        
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label for="username">Display Name</label>
                <div class="input-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" required placeholder="BookWorm99">
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Create Account</button>
        </form>
        
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
